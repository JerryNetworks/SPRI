# =============================================================================
# IS-IS study lab  -  8 routers, mixed Cisco c8000v (IOS-XE) + XRd (IOS-XR)
# Single Level-2 area.  Mix of point-to-point and broadcast (LAN) links.
# =============================================================================
#
# Broadcast LANs are built with Arista cEOS "switch" nodes (sw1, sw2) that
# containerlab creates and destroys automatically — no host bridges to set up.
# cEOS ports default to switchport access VLAN 1 (pure L2) and come up as STP
# edge ports (forwarding immediately), giving a true multi-access segment for
# DIS-election / pseudonode study.
#
# Interface naming used in the links below (clab requires native names per kind):
#   c8000v (cisco_c8000v):  eth1=Gi2, eth2=Gi3, eth3=Gi4 ...   (Gi1 = mgmt)
#   XRd    (cisco_xrd):     Gi0-0-0-0, Gi0-0-0-1, Gi0-0-0-2 ... (= Gi0/0/0/X)
#   cEOS   (arista_ceos):   eth1, eth2, eth3 (= Ethernet1/2/3)
#
# Credentials:  c8000v -> admin/admin     XRd -> clab/clab@123
# Deploy:  sudo clab deploy -t isis-lab.clab.yml   (see README.md)
# =============================================================================

name: isis-lab

mgmt:
  network: isis-lab-mgmt
  ipv4-subnet: 172.20.20.0/24

topology:
  kinds:
    cisco_c8000v:
      # installed on the lab server (10.0.0.172): 17.15.05 and 17.12.05a
      image: vrnetlab/cisco_c8000v:17.15.05
    cisco_xrd:
      # installed on the lab server (10.0.0.172)
      image: ios-xr/xrd-control-plane:26.1.1
    arista_ceos:
      # used for the broadcast-LAN switches (pure L2, default VLAN 1)
      image: ceos:4.35.2F

  nodes:
    # ----- c8000v (IOS-XE) -------------------------------------------------
    r1: { kind: cisco_c8000v }
    r2: { kind: cisco_c8000v }
    r3: { kind: cisco_c8000v }
    r4: { kind: cisco_c8000v }
    # ----- XRd (IOS-XR) ----------------------------------------------------
    r5: { kind: cisco_xrd }
    r6: { kind: cisco_xrd }
    r7: { kind: cisco_xrd }
    r8: { kind: cisco_xrd }

    # ----- broadcast-segment switches (auto-managed by containerlab) -------
    # Arista cEOS as pure L2 switches. Default config (switchport access VLAN 1,
    # STP edge) needs no startup-config for an IS-IS broadcast segment.
    sw1: { kind: arista_ceos }   # LAN-1 switch (r1, r5, r6)
    sw2: { kind: arista_ceos }   # LAN-2 switch (r3, r4, r8)

  links:
    # ===== Broadcast LAN-1  (r1 c8000v, r5 XRd, r6 XRd) ====================
    # Mixed IOS-XE / IOS-XR segment -> great for DIS election study
    - endpoints: ["r1:eth1", "sw1:eth1"]
    - endpoints: ["r5:Gi0-0-0-0", "sw1:eth2"]
    - endpoints: ["r6:Gi0-0-0-0", "sw1:eth3"]

    # ===== Broadcast LAN-2  (r3 c8000v, r4 c8000v, r8 XRd) ================
    - endpoints: ["r3:eth2", "sw2:eth1"]
    - endpoints: ["r4:eth1", "sw2:eth2"]
    - endpoints: ["r8:Gi0-0-0-0", "sw2:eth3"]

    # ===== Point-to-point links ==========================================
    - endpoints: ["r1:eth2", "r2:eth1"]            # r1 <-> r2
    - endpoints: ["r2:eth2", "r3:eth1"]            # r2 <-> r3
    - endpoints: ["r2:eth3", "r7:Gi0-0-0-0"]       # r2 <-> r7
    - endpoints: ["r4:eth2", "r5:Gi0-0-0-1"]       # r4 <-> r5
    - endpoints: ["r5:Gi0-0-0-2", "r7:Gi0-0-0-1"]  # r5 <-> r7
    - endpoints: ["r6:Gi0-0-0-1", "r8:Gi0-0-0-1"]  # r6 <-> r8
    - endpoints: ["r7:Gi0-0-0-2", "r8:Gi0-0-0-2"]  # r7 <-> r8
    - endpoints: ["r3:eth3", "r6:Gi0-0-0-2"]       # r3 <-> r6
